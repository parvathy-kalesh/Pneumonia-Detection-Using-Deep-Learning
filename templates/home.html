<!DOCTYPE html>
<html>
<head>
    <title>Home - Pneumonia Detection</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;600&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background: #0f172a;
            color: #e5e7eb;
        }

        .main-container {
            min-height: 100vh;
        }

        .main-card {
            background: #1e293b;
            border-radius: 20px;
            padding: 50px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.6);
        }

        .title {
            color: #38bdf8;
            font-weight: 600;
        }

        .subtitle {
            color: #94a3b8;
            font-size: 16px;
        }

        .btn-start {
            background: #38bdf8;
            border: none;
            border-radius: 30px;
            padding: 12px 30px;
            font-weight: 600;
            color: black;
            transition: 0.3s;
        }

        .btn-start:hover {
            background: #0ea5e9;
        }

        .icon {
            font-size: 60px;
            margin-bottom: 15px;
        }
    </style>
</head>

<body>

<div class="container d-flex justify-content-center align-items-center main-container">

    <div class="col-md-7 text-center">

        <div class="main-card">

            <div class="icon">🩺</div>

            <h1 class="display-5 title mb-3">
                Pneumonia Detection System
            </h1>

            <p class="subtitle mb-4">
                Upload chest X-ray images and detect Pneumonia using Deep Learning
            </p>

            <a href="/predict" class="btn btn-start btn-lg">
                🚀 Start Prediction
            </a>

        </div>

    </div>

</div>

</body>
</html>
