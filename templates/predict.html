<!DOCTYPE html>
<html>
<head>
    <title>Prediction Page</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;600&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background: #0f172a;
            color: #e5e7eb;
        }

        .main-card {
            background: #1e293b;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .title {
            font-weight: 600;
            color: #38bdf8;
        }

        .subtitle {
            color: #94a3b8;
            font-size: 14px;
        }

        .upload-box {
            border: 2px dashed #38bdf8;
            padding: 25px;
            border-radius: 12px;
            background: #020617;
            transition: 0.3s;
        }

        .upload-box:hover {
            background: #0f172a;
        }

        input[type="file"] {
            background: transparent;
            color: #e5e7eb;
            border: none;
        }

        .btn-custom {
            background: #38bdf8;
            border: none;
            border-radius: 25px;
            color: black;
            font-weight: 600;
            padding: 10px;
            transition: 0.3s;
        }

        .btn-custom:hover {
            background: #0ea5e9;
        }

        .btn-back {
            border-radius: 20px;
        }

        .result-box {
            background: #020617;
            padding: 20px;
            border-radius: 12px;
            border: 1px solid #38bdf8;
        }

        img {
            border-radius: 15px;
            border: 2px solid #38bdf8;
        }
    </style>
</head>

<body>

<div class="container d-flex justify-content-center align-items-center" style="min-height: 100vh;">

    <div class="col-md-6">

        <div class="main-card">

            <h2 class="text-center title mb-2">
                🩺 Pneumonia Detection
            </h2>

            <p class="text-center subtitle mb-4">
                Upload a chest X-ray image for AI-based diagnosis
            </p>

            <form method="POST" enctype="multipart/form-data">

                <div class="upload-box mb-3">
                    <label class="form-label">Choose X-ray Image</label>
                    <input type="file" name="file" class="form-control" required>
                </div>

                <button type="submit" class="btn btn-custom w-100">
                    🔍 Predict Now
                </button>

            </form>

            <div class="text-center mt-3">
                <a href="/" class="btn btn-outline-light btn-back">⬅ Back to Home</a>
            </div>

            {% if img_path %}
            <div class="text-center mt-4">
                <h5 class="mb-2">Uploaded Image</h5>
                <img src="{{ img_path }}" class="img-fluid shadow" width="250">
            </div>
            {% endif %}

            {% if result %}
            <div class="result-box text-center mt-4">
                <h4 class="text-info">{{ result }}</h4>
            </div>
            {% endif %}

        </div>

    </div>

</div>

</body>
</html>
